services:
  # Flask API — Python web service
  - type: web
    name: drc-api
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "drc_stat_engine.api.app:create_app()"
    envVars:
      - key: CORS_ORIGINS
        sync: false   # set manually in Render dashboard to your frontend URL

  # Vue frontend — static site
  - type: web
    name: drc-front
    runtime: static
    buildCommand: cd drc_front && npm install && npm run build
    staticPublishPath: drc_front/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set manually in Render dashboard to your API service URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
